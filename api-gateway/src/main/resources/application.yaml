server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: product-service
#          uri: http://localhost:8082
          uri: lb://product-service
          predicates:
            - Path=/products/**

        - id: order-service
#          uri: http://localhost:8083
          uri: lb://order-service
          predicates:
            - Path=/orders/**

#eureka:
#  client:
#    enabled: false

eureka:
  client:
    service-url:
#      defaultZone: http://localhost:8761/eureka
      defaultZone: http://discovery-server:8761/eureka